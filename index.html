<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter Pro+</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#4facfe,#00c6ff);
min-height:100vh;
color:white;
transition:0.5s;

}

body.dark{

background:#101010;

}

header{

padding:25px;
text-align:center;
font-size:35px;
font-weight:bold;

}

.container{

width:95%;
max-width:1200px;
margin:auto;

}

.search{

display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:20px;

}

input{

width:320px;
padding:15px;
font-size:18px;
border:none;
border-radius:15px;

}

button{

padding:15px 20px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:17px;
background:#007bff;
color:white;
transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.card{

background:rgba(255,255,255,.18);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
margin-top:20px;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;

}

.box{

background:rgba(255,255,255,.15);
padding:15px;
border-radius:15px;
text-align:center;

}

.temp{

font-size:65px;
font-weight:bold;
text-align:center;

}

.icon{

font-size:70px;
text-align:center;

}

#forecast{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:12px;
margin-top:20px;

}

.day{

background:rgba(255,255,255,.2);
padding:15px;
border-radius:15px;
text-align:center;

}

#hourly{

display:flex;
overflow:auto;
gap:10px;
margin-top:20px;

}

.hour{

min-width:90px;
background:rgba(255,255,255,.2);
padding:10px;
border-radius:12px;
text-align:center;

}

.warning{

padding:15px;
border-radius:15px;
font-size:20px;
text-align:center;
margin-top:20px;
font-weight:bold;

}

.good{

background:#28a745;

}

.warn{

background:#ff9800;

}

.bad{

background:#d32f2f;

}

footer{

text-align:center;
padding:30px;
opacity:.8;

}

.dark .card,
.dark .box,
.dark .day,
.dark .hour{

background:#222;

}

@media(max-width:700px){

.temp{

font-size:45px;

}

header{

font-size:28px;

}

}

</style>
</head>

<body>

<header>

🌤 Wetter Pro+

</header>

<div class="container">

<div class="search">

<input id="city" placeholder="Stadt eingeben">

<button onclick="searchCity()">🔍</button>

<button onclick="gps()">📍</button>

<button onclick="toggleDark()">🌙</button>

</div>

<div id="current"></div>

<div id="warning"></div>

<div class="card">

<h2>📅 7-Tage-Vorhersage</h2>

<div id="forecast"></div>

</div>

<div class="card">

<h2>⏰ 24-Stunden-Vorhersage</h2>

<div id="hourly"></div>

</div>

<footer>

Wetterdaten von Open-Meteo

</footer>

<script>

function toggleDark(){

document.body.classList.toggle("dark");

}

function icon(code){

if(code==0) return "☀️";
if(code<=3) return "⛅";
if(code<=48) return "🌫️";
if(code<=67) return "🌧️";
if(code<=77) return "❄️";
if(code<=82) return "🌦️";
if(code>=95) return "⛈️";

return "🌈";

}

function text(code){

if(code==0) return "Sonnig";
if(code<=3) return "Bewölkt";
if(code<=48) return "Nebel";
if(code<=67) return "Regen";
if(code<=77) return "Schnee";
if(code<=82) return "Schauer";
if(code>=95) return "Gewitter";

return "Unbekannt";

}
async function searchCity(){

const city=document.getElementById("city").value;

if(city=="") return;

try{

const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=de`);
const g=await geo.json();

if(!g.results){
alert("Stadt nicht gefunden.");
return;
}

loadWeather(
g.results[0].latitude,
g.results[0].longitude,
g.results[0].name
);

}catch(e){

alert("Fehler beim Laden.");

}

}

function gps(){

navigator.geolocation.getCurrentPosition(

(position)=>{

loadWeather(
position.coords.latitude,
position.coords.longitude,
"Dein Standort"
);

},

()=>{

alert("Standort konnte nicht bestimmt werden.");

}

);

}

async function loadWeather(lat,lon,name){

document.getElementById("current").innerHTML=
"<div class='card'><h2>Lade Wetterdaten...</h2></div>";

const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,pressure_msl,weather_code&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=auto`;

const res=await fetch(url);

const data=await res.json();

const c=data.current;

document.getElementById("current").innerHTML=`

<div class="card">

<h2>📍 ${name}</h2>

<div class="icon">${icon(c.weather_code)}</div>

<div class="temp">${c.temperature_2m}°C</div>

<h3 style="text-align:center">${text(c.weather_code)}</h3>

<div class="grid">

<div class="box">
💧<br>
Luftfeuchtigkeit
<br><b>${c.relative_humidity_2m}%</b>
</div>

<div class="box">
💨<br>
Wind
<br><b>${c.wind_speed_10m} km/h</b>
</div>

<div class="box">
🌡️<br>
Gefühlt
<br><b>${c.apparent_temperature}°C</b>
</div>

<div class="box">
🌍<br>
Luftdruck
<br><b>${c.pressure_msl} hPa</b>
</div>

<div class="box">
🌅<br>
${data.daily.sunrise[0].split("T")[1]}
</div>

<div class="box">
🌇<br>
${data.daily.sunset[0].split("T")[1]}
</div>

</div>

</div>

`;

let warnung="✅ Keine Wetterwarnung";
let klasse="good";

if(c.temperature_2m>=30){

warnung="🔥 Hitzewarnung";
klasse="bad";

}
else if(c.temperature_2m<=0){

warnung="🥶 Frostwarnung";
klasse="warn";

}
else if(c.wind_speed_10m>=50){

warnung="💨 Sturmwarnung";
klasse="bad";

}
else if(c.weather_code>=95){

warnung="⛈ Gewitterwarnung";
klasse="bad";

}

document.getElementById("warning").innerHTML=

`<div class="warning ${klasse}">${warnung}</div>`;

let forecast="";

for(let i=0;i<7;i++){

forecast+=`

<div class="day">

<b>${
new Date(data.daily.time[i]).toLocaleDateString(
"de-DE",
{weekday:"short"}
)
}</b>

<br><br>

${icon(data.daily.weather_code[i])}

<br><br>

⬆️ ${data.daily.temperature_2m_max[i]}°C

<br>

⬇️ ${data.daily.temperature_2m_min[i]}°C

</div>

`;

}

document.getElementById("forecast").innerHTML=forecast;

let hourly="";

for(let i=0;i<24;i++){

hourly+=`

<div class="hour">

${data.hourly.time[i].split("T")[1]}

<br><br>

${icon(data.hourly.weather_code[i])}

<br>

${data.hourly.temperature_2m[i]}°

</div>

`;

}

document.getElementById("hourly").innerHTML=hourly;

}

document.getElementById("city").addEventListener("keydown",function(e){

if(e.key==="Enter"){

searchCity();

}

});

gps();

</script>

</body>
</html>
